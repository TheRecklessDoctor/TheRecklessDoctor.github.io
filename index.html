<!DOCTYPE html>
<html lang="en">
<head>
    <title>FIT3179 Week 9</title>

    <script src="https://cdn.jsdelivr.net/npm/vega@5.20.2"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5.1.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6.17.0"></script>
    
    <!-- CSS file -->
    <link rel="stylesheet" type="text/css" href="css/styles.css" media="all">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@2.1.0/build/pure-min.css" integrity="sha384-yHIFVG6ClnONEA5yB5DJXfW2/KC173DIQrYoZMEtBvGzmf0PKiGyNEqe9N6BNDBH" crossorigin="anonymous">
    <!-- meta tag for viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <div id="title" class = "pure-g">
        <h1 id="Main_title" class = "pure-u-1-1">
            First vega-lite graph
        </h1>
    </div>

    <div id="main_content">
        <div class = "pure-g">
            <p id="Intro" class="pure-u-1-1">
                This is an analysis and visualization of data relating to population changes around the globe. The data ranges over a 
                52 year span starting from 1970 to 2022. Various charts have been used to see how human populations changed, based on the continents.
            </p>
        </div>
        
        <div class="pure-g">
            <div id="map" class="pure-u-1-1"></div>
        </div>
        <div class="pure-g">
            <div id="scatter_1970" class="pure-u-1-2"></div>
            <div id="scatter_2022" class="pure-u-1-2"></div>
        </div>
        <div class="pure-g">
            <div id="GR_bar" class="pure-u-1-1"></div>
        </div>
        <div class="pure-g">
            <div id="donutChart" class="pure-u-1-2"></div>
            <div id="LineChart" class="pure-u-1-2"></div>
        </div>
    </div>
   

    <script type="text/javascript">

        var vg_1 = "js/visualization.vg.json";
        vegaEmbed("#map", vg_1).then(function(result) {
        // Access the Vega view instance
        // (https://vega.github.io/vega/docs/api/view/) as result.view
        }).catch(console.error);

        var vg_2 = "js/scatterPlot_1970.vg.json";
        vegaEmbed("#scatter_1970", vg_2).then(function(result) {
        // Access the Vega view instance
        // (https://vega.github.io/vega/docs/api/view/) as result.view
        }).catch(console.error);

        var vg_3 = "js/scatterPlot_2022.vg.json";
        vegaEmbed("#scatter_2022", vg_3).then(function(result) {
        // Access the Vega view instance
        // (https://vega.github.io/vega/docs/api/view/) as result.view
        }).catch(console.error);

        var vg_4 = "js/GR_top10.vg.json";
        vegaEmbed("#GR_bar", vg_4).then(function(result) {
        // Access the Vega view instance
        // (https://vega.github.io/vega/docs/api/view/) as result.view
        }).catch(console.error);

        var vg_5 = "js/donut_chart.vg.json";
        vegaEmbed("#donutChart", vg_5).then(function(result) {
        // Access the Vega view instance
        // (https://vega.github.io/vega/docs/api/view/) as result.view
        }).catch(console.error);

        var vg_6 = "js/LineChart.vg.json";
        vegaEmbed("#LineChart", vg_6).then(function(result) {
        // Access the Vega view instance
        // (https://vega.github.io/vega/docs/api/view/) as result.view
        }).catch(console.error);
    </script>
</body>
</html>
